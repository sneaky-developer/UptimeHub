version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: uptimehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: uptimehub
      POSTGRES_PASSWORD: uptimehub_secret
      POSTGRES_DB: uptimehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptimehub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uptimehub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  master:
    build:
      context: ./master
      dockerfile: Dockerfile
    container_name: uptimehub-master
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - APP_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=uptimehub
      - DB_PASSWORD=uptimehub_secret
      - DB_NAME=uptimehub
      - DB_SSLMODE=disable
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./master:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uptimehub-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - master

volumes:
  postgres_data:
  redis_data:
