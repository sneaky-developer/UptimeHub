services:
  postgres:
    image: postgres:18-alpine
    container_name: uptimehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: uptimehub
      POSTGRES_PASSWORD: uptimehub_secret
      POSTGRES_DB: uptimehub
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptimehub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uptimehub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  master:
    build:
      context: ./master
      dockerfile: Dockerfile
    container_name: uptimehub-master
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - APP_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=uptimehub
      - DB_PASSWORD=uptimehub_secret
      - DB_NAME=uptimehub
      - DB_SSLMODE=disable
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    # Removed volume mount for master

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uptimehub-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - master

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: uptimehub-agent
    restart: unless-stopped
    environment:
      - MASTER_URL=http://master:8080
      - AGENT_NAME=local-agent-1
      - CLUSTER_NAME=local-docker
    depends_on:
      - master


