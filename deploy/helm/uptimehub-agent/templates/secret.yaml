{{- if not .Values.master.existingSecret }}
{{- if not .Values.master.enrollmentToken }}
{{- fail "Set master.enrollmentToken or master.existingSecret — the agent cannot register without an enrollment token (create one in Admin → Agents → Groups)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "uptimehub-agent.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "uptimehub-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  ENROLLMENT_TOKEN: {{ .Values.master.enrollmentToken | quote }}
{{- end }}
